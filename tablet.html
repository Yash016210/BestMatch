<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BestMatch</title>
    <link rel="stylesheet" href="tablet.css">
</head>
<body>
    <header>
        <h1>BestMatch</h1>
        <nav>
            <ul>
                <li><a href="index.html">Mobiles</a></li>
                <li><a href="tablet.html">Tablets</a></li>
                <li><a href="laptop.html">Laptops</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="comparison-container">
            <h2>BestMatch Tablets</h2>
            <div class="product-comparison">
                <!-- Product 1 -->
                <div class="product-card">
                    <img src="https://i.postimg.cc/W1Z98jfy/Untitled-design-2.png" alt="Bike 1">
                    <div class="specs">
                        <select class="bike-selector" id="bike1" onchange="updateComparison()">
                            <option value="">Select Tablet 1</option>
                            <option value="AppleiPad10thGen">Apple iPad 10th Gen (2022)</option>
                            <option value="AppleiPadMini6">Apple iPad Mini 6 (2021)</option>
                            <option value="AppleiPadPro4thGen">Apple iPad Pro 4th Gen (2022)</option>
                            <option value="AppleiPadAir1stGen">Apple iPad Air 1st Gen 2024</option>
                            <option value="AppleiPadPro5thGen">Apple iPad Pro 5th Gen 2024</option>
                            <option value="SamsungTabS10U">Samsung Tab S10U</option>
                        </select>
                        <div class="spec-item blue">Name</div>
                        <div class="spec-item blue">Display</div>
                        <div class="spec-item blue">Processor</div>
                        <div class="spec-item blue">Camera</div>
                        <div class="spec-item blue">RAM/ROM</div>
                        <div class="spec-item blue">Battery</div>
                        <div class="spec-item red">Price</div>
                    </div>
                </div>
                <!-- Product 2 -->

                        </select>
                        <div class="spec-item blue">Name</div>
                        <div class="spec-item blue">Display</div>
                        <div class="spec-item blue">Processor</div>
                        <div class="spec-item blue">Camera</div>
                        <div class="spec-item blue">RAM/ROM</div>
